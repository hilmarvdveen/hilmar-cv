name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-cv-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-cv-site/package-lock.json

      - name: Install dependencies
        # `npm install` (not `npm ci`) so the Linux runner can resolve
        # platform-specific optional deps (e.g. @next/swc-linux-*, sharp,
        # @emnapi/*) whose transitive entries a Windows-generated lockfile
        # can't fully capture. The lockfile still pins the resolvable graph.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
